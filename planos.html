<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investir - Nexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #060b19 0%, #020408 100%);
            --card-glass: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.07);
            --blue-primary: #0052ff;
            --blue-gradient: linear-gradient(135deg, #0052ff 0%, #00a2ff 100%);
            --cyan-neon: #00d2ff;
            --text-muted: #8a99ad;
            --green-profit: #00e676;
            --gold-accent: #ffd700;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg-gradient); 
            color: white; 
            padding: 25px 20px; 
            padding-bottom: 120px; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* TÍTULO DA PÁGINA PREMIUM */
        .header-section { 
            margin: 15px 5px 25px 5px; 
        }
        .header-section h2 { 
            font-size: 1.6rem; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }
        .header-section h2 span { 
            color: var(--cyan-neon); 
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.3); 
        }
        .header-section p { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            margin-top: 4px; 
        }

        /* BALANÇO FINTECH GLASSMORPHISM */
        .account-balance-card {
            background: var(--card-glass);
            border-radius: 24px;
            padding: 22px 25px;
            margin-bottom: 30px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        .account-balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 180px;
            height: 180px;
            background: rgba(0, 82, 255, 0.15);
            filter: blur(45px);
            border-radius: 50%;
        }
        .account-balance-card small { 
            color: var(--text-muted); 
            font-size: 0.68rem; 
            text-transform: uppercase; 
            letter-spacing: 0.6px; 
            display: block;
            font-weight: 600;
        }
        .account-balance-card .balance-value { 
            font-size: 1.75rem; 
            font-weight: 800; 
            color: #fff; 
            margin-top: 5px; 
            letter-spacing: -0.5px;
        }

        /* SELETOR DE ABAS PREMIUM CHIPS */
        .tier-navigation-bar {
            display: flex;
            background: rgba(255, 255, 255, 0.02);
            padding: 6px;
            border-radius: 16px;
            margin-bottom: 25px;
            gap: 6px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(5px);
        }
        .tier-tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 12px 2px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tier-tab-btn.active {
            background: rgba(0, 210, 255, 0.08);
            color: var(--cyan-neon);
            border: 1px solid rgba(0, 210, 255, 0.2);
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.2);
        }

        .plans-list { display: flex; flex-direction: column; gap: 22px; }

        /* CARDS DE INVESTIMENTO ULTRA-PREMIUM */
        .plan-premium-card {
            background: var(--card-glass); 
            border: 1px solid var(--card-border);
            border-radius: 26px; 
            padding: 25px; 
            position: relative; 
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .card-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            width: 100%;
        }

        .plan-premium-card h3 { 
            font-size: 0.95rem; 
            color: #fff; 
            font-weight: 800; 
            letter-spacing: 0.3px;
        }
        
        .badge-cycle {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--card-border);
            font-size: 0.65rem; 
            color: var(--cyan-neon);
            font-weight: 700; 
            padding: 6px 14px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .price-holder { 
            font-size: 2.3rem; 
            font-weight: 900; 
            color: #fff; 
            margin-bottom: 22px; 
            letter-spacing: -1px; 
            text-align: left;
            width: 100%;
        }
        .price-holder small {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-right: 4px;
        }

        .metrics-asymmetric-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            width: 100%; 
            gap: 12px; 
            margin-bottom: 18px; 
        }
        .metric-cell { 
            background: rgba(0, 0, 0, 0.15); 
            padding: 14px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.02); 
        }
        .metric-cell span { font-size: 0.62rem; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 4px; font-weight: 600; }
        .metric-cell strong { font-size: 0.9rem; color: #fff; font-weight: 700; }

        .total-yield-box { 
            width: 100%; 
            background: rgba(0, 230, 118, 0.03); 
            border: 1px solid rgba(0, 230, 118, 0.12); 
            padding: 15px; 
            border-radius: 16px; 
            margin-bottom: 22px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-yield-box span { font-size: 0.68rem; color: var(--green-profit); text-transform: uppercase; font-weight: 700; letter-spacing: 0.3px; }
        .total-yield-box strong { font-size: 1.1rem; color: var(--green-profit); font-weight: 800; }
        
        /* BOTÕES DE ATIVAÇÃO PREMIUM */
        .btn-action-trigger { 
            background: var(--blue-gradient); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            width: 100%; 
            font-size: 0.88rem; 
            text-transform: uppercase; 
            letter-spacing: 0.6px; 
            box-shadow: 0 8px 25px rgba(0, 82, 255, 0.25); 
            transition: all 0.2s ease; 
        }
        .btn-action-trigger:active {
            transform: scale(0.98);
            box-shadow: 0 4px 15px rgba(0, 82, 255, 0.2);
        }

        .btn-action-locked { 
            background: rgba(255, 255, 255, 0.02) !important; 
            color: rgba(255,255,255,0.2) !important; 
            cursor: not-allowed !important; 
            box-shadow: none !important; 
            border: 1px solid var(--card-border);
        }

        /* OPACIDADE REZUZIDA PARA PLANOS BLOQUEADOS */
        .plan-premium-card.locked-card {
            opacity: 0.45;
        }

        /* NATIVE BOTTOM NAVIGATION HUB */
        .nav-bottom { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #030611; display: flex; justify-content: space-around; 
            padding: 10px 0; border-top: 1px solid var(--card-border); 
            z-index: 10000; height: 75px; align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .nav-item { 
            color: var(--text-muted); text-align: center; text-decoration: none; flex: 1; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            gap: 4px; transition: color 0.2s;
        }
        .nav-item i { font-size: 1.25rem; }
        .nav-item span { font-size: 0.65rem; font-weight: 500; }

        .nav-item.active { color: white; }
        .nav-item.active i { color: var(--cyan-neon); text-shadow: 0 0 10px rgba(0, 210, 255, 0.4); }

    </style>
</head>
<body>

    <div class="header-section">
        <h2 class="animate__animated animate__fadeInLeft"><span>Nexus</span> Mercado</h2>
        <p class="animate__animated animate__fadeInLeft" style="animation-delay: 0.05s;">Aloque capital nos contratos de rendimento automatizado</p>
    </div>

    <div class="account-balance-card animate__animated animate__fadeInDown">
        <small>Saldo operacional disponível</small>
        <div id="user-balance" class="balance-value">R$ 0,00</div>
    </div>

    <div class="tier-navigation-bar animate__animated animate__fadeIn">
        <button class="tier-tab-btn active" id="tab-essencial" onclick="switchTierTab('essencial')">Essenciais</button>
        <button class="tier-tab-btn" id="tab-prime" onclick="switchTierTab('prime')">Prime</button>
        <button class="tier-tab-btn" id="tab-exclusive" onclick="switchTierTab('exclusive')">Alta Perf.</button>
    </div>

    <div id="container-planos" class="plans-list animate__animated animate__fadeInUp"></div>

    <nav class="nav-bottom">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>Início</span></a>
        <a href="planos.html" class="nav-item active"><i class="fas fa-chart-pie"></i><span>Planos</span></a>
        <a href="indicacao.html" class="nav-item"><i class="fas fa-share-alt"></i><span>Indicar</span></a>
        <a href="perfil.html" class="nav-item"><i class="fas fa-user-alt"></i><span>Perfil</span></a>
    </nav>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, Timestamp, increment, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDKDFw7khZzM9hIX7xbbrbFQeESiCLnmOw",
        authDomain: "monety-site-9175f.firebaseapp.com",
        projectId: "monety-site-9175f",
        storageBucket: "monety-site-9175f.firebasestorage.app",
        messagingSenderId: "840821848803",
        appId: "1:840821848803:web:b99a5528e4bb925518a3d6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let saldoAtual = 0;
    let uidUsuario = null;
    let activeTier = 'essencial';

    const listaPlanos = [
        { nome: 'MINI', valor: 30, dias: 60, diario: 6, total: 360, ativo: true, tier: 'essencial' },
        { nome: 'BRONZE', valor: 50, dias: 30, diario: 10, total: 300, ativo: true, tier: 'essencial' },
        { nome: 'START', valor: 100, dias: 30, diario: 20, total: 600, ativo: true, tier: 'essencial' },
        { nome: 'PRATA', valor: 200, dias: 30, diario: 40, total: 1200, ativo: true, tier: 'essencial' },
        { nome: 'SPEED', valor: 350, dias: 30, diario: 70, total: 2100, ativo: true, tier: 'prime' },
        { nome: 'OURO', valor: 450, dias: 30, diario: 90, total: 2700, ativo: true, tier: 'prime' },
        { nome: 'ADVANCED', valor: 500, dias: 30, diario: 100, total: 3000, ativo: true, tier: 'prime' },
        { nome: 'VITALITY', valor: 700, dias: 30, diario: 140, total: 4200, ativo: true, tier: 'prime' },
        { nome: 'PREMIUM', valor: 1000, dias: 30, diario: 200, total: 6000, ativo: true, tier: 'exclusive' },
        { nome: 'VIP', valor: 2000, dias: 30, diario: 400, total: 12000, ativo: true, tier: 'exclusive' },
        { nome: 'ELITE', valor: 3000, dias: 30, diario: 0, total: 0, ativo: false, tier: 'exclusive' },
        { nome: 'ULTIMATE', valor: 5000, dias: 30, diario: 0, total: 0, ativo: false, tier: 'exclusive' }
    ];

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            uidUsuario = user.uid;
            await carregarDados();
            await verificarRendimentos();
            gerarPlanos();
        } else { window.location.href = "login.html"; }
    });

    async function carregarDados() {
        try {
            const snap = await getDoc(doc(db, "usuarios", uidUsuario));
            if (snap.exists()) {
                const dados = snap.data();
                saldoAtual = Number(dados.saldo || dados.balance) || 0;
                document.getElementById('user-balance').innerText = `R$ ${saldoAtual.toFixed(2).replace('.', ',')}`;
            }
        } catch (e) { console.error("Erro ao carregar saldo:", e); }
    }

    async function verificarRendimentos() {
        try {
            const q = query(collection(db, "investimentos"), 
                where("userId", "==", uidUsuario),
                where("status", "==", "ativo")
            );
            
            const snapshot = await getDocs(q);
            const agora = new Date();

            for (const docInv of snapshot.docs) {
                const dadosInv = docInv.data();
                if (!dadosInv.ultimoPagamento) continue;

                const ultimoPag = dadosInv.ultimoPagamento.toDate();
                const dataExp = dadosInv.dataExpiracao.toDate();

                if (agora > dataExp) {
                    await updateDoc(doc(db, "investimentos", docInv.id), { status: "finalizado" });
                    continue;
                }

                const diffTime = Math.abs(agora - ultimoPag);
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays >= 1) {
                    const valorPagar = dadosInv.rendimentoDiario * diffDays;
                    await updateDoc(doc(db, "usuarios", uidUsuario), {
                        saldoLucro: increment(valorPagar),
                        totalEarned: increment(valorPagar)
                    });

                    await updateDoc(doc(db, "investimentos", docInv.id), {
                        ultimoPagamento: Timestamp.now()
                    });

                    await addDoc(collection(db, "historico"), {
                        userId: uidUsuario,
                        valor: valorPagar,
                        tipo: "Rendimento",
                        descricao: `Rendimento ${diffDays} dia(s) - Plano ${dadosInv.plano}`,
                        data: Timestamp.now()
                    });
                }
            }
        } catch (error) { console.error("Erro nos rendimentos:", error); }
    }

    function gerarPlanos() {
        const container = document.getElementById('container-planos');
        const planosFiltrados = listaPlanos.filter(p => p.tier === activeTier);

        container.innerHTML = planosFiltrados.map(p => `
            <div class="plan-premium-card ${p.ativo ? '' : 'locked-card'}">
                <div class="card-top-row">
                    <h3>CONTRATO ${p.nome}</h3>
                    <div class="badge-cycle">${p.dias} Dias Úteis</div>
                </div>
                <div class="price-holder"><small>R$</small>${p.valor.toFixed(2).replace('.', ',')}</div>
                <div class="metrics-asymmetric-grid">
                    <div class="metric-cell">
                        <span>Retorno Diário</span>
                        <strong>R$ ${p.diario.toFixed(2).replace('.', ',')}</strong>
                    </div>
                    <div class="metric-cell">
                        <span>Fração de Lucro</span>
                        <strong style="color:var(--gold-accent)">+ ${(p.valor > 0 ? (p.diario / p.valor * 100) : 0).toFixed(1)}% /dia</strong>
                    </div>
                </div>
                <div class="total-yield-box">
                    <span>Projeção de Retorno Total</span>
                    <strong>R$ ${p.total.toFixed(2).replace('.', ',')}</strong>
                </div>
                <button class="${p.ativo ? 'btn-action-trigger' : 'btn-action-trigger btn-action-locked'}" 
                    onclick="${p.ativo ? `comprarPlano('${p.nome}', ${p.valor}, ${p.diario}, ${p.dias})` : ''}">
                    ${p.ativo ? 'Ativar Contrato' : '<i class="fas fa-lock" style="margin-right:5px;"></i> Indisponível'}
                </button>
            </div>`).join('');
    }

    window.switchTierTab = function(tier) {
        activeTier = tier;
        document.querySelectorAll('.tier-tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${tier}`).classList.add('active');
        gerarPlanos();
    }

    async function processarComissoesRede(valorPlano) {
        try {
            const compradorSnap = await getDoc(doc(db, "usuarios", uidUsuario));
            if (!compradorSnap.exists()) return;
            
            const dados = compradorSnap.data();
            if (dados.jaGerouBonus === true) return;

            const rede = [
                { id: dados.indicadoPor, pct: 0.10 },      
                { id: dados.indicadoPorAvo, pct: 0.05 },  
                { id: dados.indicadoPorBisavo, pct: 0.02 } 
            ];

            for (let i = 0; i < rede.length; i++) {
                const indicanteId = rede[i].id;
                if (indicanteId && indicanteId.trim() !== "") {
                    let porcentagem = rede[i].pct;
                    
                    if (i === 0) { 
                        const paiSnap = await getDoc(doc(db, "usuarios", indicanteId));
                        if (paiSnap.exists()) {
                            const count = paiSnap.data().indicadosCount || 0;
                            if (count >= 50) porcentagem = 0.20;
                            else if (count >= 10) porcentagem = 0.15;
                        }
                    }

                    const bonus = valorPlano * porcentagem;
                    await updateDoc(doc(db, "usuarios", indicanteId), {
                        saldoLucro: increment(bonus),
                        totalComissoes: increment(bonus)
                    });

                    await addDoc(collection(db, "historico"), {
                        userId: indicanteId,
                        valor: bonus,
                        tipo: "Indicação",
                        descricao: `Comissão Nível ${i+1} - Referente a ${dados.nome || 'Novo Membro'}`,
                        data: Timestamp.now()
                    });
                }
            }
            await updateDoc(doc(db, "usuarios", uidUsuario), { jaGerouBonus: true });
        } catch (e) { console.error("Erro no processamento de rede:", e); }
    }

    window.comprarPlano = async (nome, valor, diario, dias) => {
        try {
            await carregarDados();

            if (saldoAtual < valor) {
                return Swal.fire({ 
                    icon: 'error', 
                    title: 'Saldo insuficiente', 
                    text: 'Você precisa de saldo de depósito para ativar planos.',
                    background: '#060b19', color: '#fff', confirmButtonColor: '#0052ff'
                });
            }

            const confirm = await Swal.fire({
                title: 'Confirmar Ativação?',
                text: `Deseja ativar o plano ${nome} por R$ ${valor.toFixed(2).replace('.', ',')}?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#00e676',
                cancelButtonColor: 'rgba(255,255,255,0.05)',
                confirmButtonText: 'Confirmar Alocação',
                cancelButtonText: 'Voltar',
                background: '#060b19', color: '#fff'
            });

            if (confirm.isConfirmed) {
                Swal.fire({ 
                    title: 'Processando...', 
                    allowOutsideClick: false, 
                    didOpen: () => Swal.showLoading(), 
                    background: '#060b19', color: '#fff' 
                });

                const dataExp = new Date();
                dataExp.setDate(dataExp.getDate() + dias);

                await addDoc(collection(db, "investimentos"), {
                    userId: uidUsuario,
                    plano: nome,
                    valor: valor,
                    rendimentoDiario: diario,
                    status: "ativo",
                    timestamp: Timestamp.now(),
                    dataExpiracao: Timestamp.fromDate(dataExp),
                    ultimoPagamento: Timestamp.now()
                });

                const userRef = doc(db, "usuarios", uidUsuario);
                const userSnap = await getDoc(userRef);
                const campoSaldo = userSnap.data().balance !== undefined ? "balance" : "saldo";

                await updateDoc(userRef, { 
                    [campoSaldo]: increment(-valor) 
                });

                await addDoc(collection(db, "historico"), {
                    userId: uidUsuario,
                    valor: -valor, 
                    tipo: "Plano Ativado", 
                    descricao: `Ativação do Plano ${nome}`,
                    data: Timestamp.now()
                });

                try {
                    await processarComissoesRede(valor);
                } catch (errRede) {
                    console.error("Erro ao pagar comissões:", errRede);
                }

                await Swal.fire({ 
                    icon: 'success', 
                    title: 'Contrato Ativado!', 
                    text: 'Seu rendimento começará em 24h.', 
                    timer: 2000, 
                    showConfirmButton: false, 
                    background: '#060b19', color: '#fff' 
                });

                window.location.href = "home.html";
            }
        } catch (e) {
            console.error("ERRO:", e);
            Swal.fire({ 
                icon: 'error', 
                title: 'Falha na Ativação', 
                text: 'Houve um erro técnico. Verifique seu saldo.', 
                background: '#060b19', color: '#fff' 
            });
        }
    };
</script>
</body>
</html>
