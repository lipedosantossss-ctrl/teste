<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Nexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2 family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #060b19 0%, #020408 100%);
            --card-glass: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.06);
            --blue-primary: #0052ff;
            --cyan-neon: #00d2ff;
            --green-success: #00e676;
            --red-danger: #ff3d00;
            --text-muted: #8a99ad;
            --skeleton-bg: rgba(255, 255, 255, 0.04);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background: var(--bg-gradient); 
            color: white; 
            padding: 20px; 
            padding-bottom: 110px; 
            min-height: 100vh; 
        }
        
        .header { display: flex; align-items: center; margin-bottom: 25px; gap: 15px; }
        .header a { color: white; text-decoration: none; font-size: 1.1rem; transition: 0.2s; opacity: 0.8; }
        .header a:hover { opacity: 1; }
        .header a:active { transform: scale(0.9); }
        .header h3 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.5px; }
        .header h3 span { color: var(--cyan-neon); margin-right: 5px; }

        /* Filtros Scroll Horizontal */
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 22px; 
            overflow-x: auto; 
            padding-bottom: 8px; 
            scrollbar-width: none; 
        }
        .tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn { 
            flex: none; 
            padding: 10px 20px; 
            border-radius: 14px; 
            border: 1px solid var(--card-border);
            background: var(--card-glass); 
            color: var(--text-muted); 
            cursor: pointer; 
            font-size: 0.8rem; 
            white-space: nowrap;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .tab-btn.active { 
            background: var(--blue-primary); 
            color: white; 
            border-color: var(--blue-primary); 
            font-weight: 600; 
            box-shadow: 0 4px 15px rgba(0, 82, 255, 0.3);
        }
        
        .tab-btn:active { transform: scale(0.95); }

        /* Cartão de Transação Premium */
        .transaction-card {
            background: var(--card-glass); 
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            padding: 18px; 
            border-radius: 20px; 
            margin-bottom: 12px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .trans-info { text-align: left; }
        .trans-info h4 { font-size: 0.9rem; margin-bottom: 5px; color: #fff; display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .trans-info small { color: var(--text-muted); font-size: 0.72rem; font-weight: 400; }
        
        .amount { font-weight: 700; font-size: 0.98rem; text-align: right; }
        .amount.plus { color: var(--green-success); }
        .amount.minus { color: white; }
        
        .status-pill { 
            font-size: 0.58rem; 
            padding: 3px 8px; 
            border-radius: 6px; 
            text-transform: uppercase; 
            font-weight: 800; 
            letter-spacing: 0.5px;
        }
        .status-pendente { background: #ff9100; color: #000; }
        .status-concluido { background: rgba(0, 230, 118, 0.15); color: var(--green-success); border: 1px solid rgba(0, 230, 118, 0.2); }
        .status-erro { background: rgba(255, 61, 0, 0.15); color: var(--red-danger); border: 1px solid rgba(255, 61, 0, 0.2); }

        /* Skeletons Modernizados */
        .skeleton {
            height: 76px; 
            background: var(--skeleton-bg); 
            border-radius: 20px; 
            margin-bottom: 12px;
            position: relative; 
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .skeleton::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Menu Inferior Harmonizado */
        .nav-bottom { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(2, 4, 8, 0.85); 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            border-top: 1px solid rgba(255,255,255,0.06); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000; 
            height: 76px; 
            align-items: center;
        }
        .nav-item { 
            color: #4b5563; 
            text-align: center; 
            text-decoration: none; 
            font-size: 0.68rem; 
            flex: 1; 
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-weight: 500;
        }
        .nav-item i { font-size: 1.25rem; }
        .nav-item.active { color: #fff; }
        .nav-item.active i { color: var(--cyan-neon); filter: drop-shadow(0 0 6px rgba(0, 210, 255, 0.4)); }
    </style>
</head>
<body>

    <div class="header">
        <a href="perfil.html"><i class="fas fa-arrow-left"></i></a>
        <h3><span>Extrato</span> de Conta</h3>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="filtrar('todos', event)">Tudo</button>
        <button class="tab-btn" onclick="filtrar('deposito', event)">Depósitos</button>
        <button class="tab-btn" onclick="filtrar('rendimento', event)">Lucros</button>
        <button class="tab-btn" onclick="filtrar('saque', event)">Saques</button>
        <button class="tab-btn" onclick="filtrar('ativação', event)">Ativações</button>
    </div>

    <div id="lista-transacoes">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
    </div>

    <nav class="nav-bottom">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i>Início</a>
        <a href="planos.html" class="nav-item"><i class="fas fa-chart-pie"></i>Planos</a>
        <a href="indicacao.html" class="nav-item"><i class="fas fa-share-alt"></i>Indicar</a>
        <a href="perfil.html" class="nav-item active"><i class="fas fa-user-alt"></i>Perfil</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKDFw7khZzM9hIX7xbbrbFQeESiCLnmOw",
            authDomain: "monety-site-9175f.firebaseapp.com",
            projectId: "monety-site-9175f",
            storageBucket: "monety-site-9175f.firebasestorage.app",
            messagingSenderId: "840821848803",
            appId: "1:840821848803:web:b99a5528e4bb925518a3d6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let transacoesGlobais = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await carregarHistorico(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        async function carregarHistorico(uid) {
            transacoesGlobais = [];
            
            try {
                const buscarColecao = async (nome, campoFiltro) => {
                    const q = query(collection(db, nome), where(campoFiltro, "==", uid));
                    return await getDocs(q);
                };

                const [snapSaques, snapGeral] = await Promise.all([
                    buscarColecao("saques", "userId"),
                    buscarColecao("historico", "userId")
                ]);

                snapSaques.forEach(doc => {
                    const d = doc.data();
                    transacoesGlobais.push({
                        categoria: 'saque',
                        titulo: 'Saque PIX',
                        valor: d.valorSolicitado || d.valor || 0,
                        data: d.timestamp?.toDate() || new Date(),
                        status: d.status || 'pendente',
                        isNegative: true
                    });
                });

                snapGeral.forEach(doc => {
                    const d = doc.data();
                    
                    let valor = Number(d.valor);
                    let isNegative = false;
                    let categoriaFiltro = 'rendimento';
                    let tituloExibicao = d.tipo || 'Transação';
                    
                    if (d.tipo === 'Depósito') {
                        categoriaFiltro = 'deposito';
                        isNegative = false;
                    } 
                    else if (d.tipo === 'Plano Ativado' || d.tipo === 'Investimento') {
                        categoriaFiltro = 'ativação';
                        tituloExibicao = 'Plano Ativado';
                        isNegative = true; 
                        if (valor > 0) valor = valor * -1;
                    } 
                    else if (d.tipo === 'Rendimento' || d.tipo === 'Indicação') {
                        categoriaFiltro = 'rendimento';
                        isNegative = false;
                    }
                    else if (valor < 0) {
                        categoriaFiltro = 'ativação';
                        isNegative = true;
                    }

                    transacoesGlobais.push({
                        categoria: categoriaFiltro,
                        titulo: tituloExibicao,
                        valor: Math.abs(valor),
                        data: d.data?.toDate() || d.timestamp?.toDate() || new Date(),
                        status: 'concluido',
                        isNegative: isNegative
                    });
                });

                transacoesGlobais.sort((a, b) => b.data - a.data);
                renderizar(transacoesGlobais);

            } catch (error) {
                console.error("Erro ao carregar histórico:", error);
                document.getElementById('lista-transacoes').innerHTML = 
                    "<p style='text-align:center; color:#8a99ad; margin-top:20px; font-size:0.85rem;'>Falha ao sincronizar dados.</p>";
            }
        }

        function renderizar(lista) {
            const container = document.getElementById('lista-transacoes');
            container.innerHTML = '';

            if (lista.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#8a99ad; margin-top:50px; font-size:0.85rem;'>Nenhuma movimentação registrada.</p>";
                return;
            }

            lista.forEach(t => {
                const dataF = t.data.toLocaleDateString('pt-BR', { 
                    day: '2-digit', month: '2-digit', 
                    hour: '2-digit', minute: '2-digit' 
                });

                const corClass = t.isNegative ? 'minus' : 'plus';
                const sinal = t.isNegative ? '-' : '+';
                
                let statusClass = 'status-concluido';
                if (t.status === 'pendente') statusClass = 'status-pendente';
                if (t.status === 'falha' || t.status === 'rejeitado') statusClass = 'status-erro';

                container.innerHTML += `
                    <div class="transaction-card">
                        <div class="trans-info">
                            <h4>${t.titulo} <span class="status-pill ${statusClass}">${t.status}</span></h4>
                            <small>${dataF}</small>
                        </div>
                        <div class="amount ${corClass}">${sinal} R$ ${parseFloat(t.valor).toFixed(2).replace('.', ',')}</div>
                    </div>
                `;
            });
        }

        window.filtrar = (tipo, e) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(e) e.target.classList.add('active');
            
            if (tipo === 'todos') {
                renderizar(transacoesGlobais);
            } else {
                const filtrados = transacoesGlobais.filter(t => t.categoria === tipo);
                renderizar(filtrados);
            }
        };
    </script>
</body>
</html>
