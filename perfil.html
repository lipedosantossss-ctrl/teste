<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Nexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg-main: #0a0a0c;
            --surface-card: #141419;
            --red-brand: #e74c3c;
            --tg-blue: #0088cc;
            --text-secondary: #71717a;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg-main); 
            color: white; 
            padding: 20px; 
            padding-bottom: 120px; 
            min-height: 100vh; 
        }

        /* TÍTULO DA PÁGINA ESTILO IOS */
        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 15px 5px 25px 5px;
            letter-spacing: -0.5px;
        }

        /* DESIGN PREMIUM STYLE: BLACK CARD DE INVESTIDOR */
        .investor-card {
            background: linear-gradient(135deg, #1d1d26 0%, #0d0d12 100%);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .investor-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(231, 76, 60, 0.15);
            filter: blur(50px);
            border-radius: 50%;
        }

        .card-header-user {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 54px;
            height: 54px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--red-brand);
        }

        .user-meta h2 { font-size: 1.15rem; font-weight: 700; text-transform: capitalize; }
        .user-meta p { color: var(--text-secondary); font-size: 0.8rem; margin-top: 2px; }

        /* Dados de Balanço dentro do cartão estilo FinTech */
        .card-balances-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 10px;
        }

        .balance-block small {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 4px;
        }

        .balance-block span {
            font-size: 1.35rem;
            font-weight: 700;
            color: #fff;
        }

        /* CATEGORIAS EM CÁPSULAS MODULARES */
        .menu-category-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin: 0 0 10px 8px;
        }

        .menu-group-box {
            background: var(--surface-card);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .menu-row-item {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            color: #efeff1;
            text-decoration: none;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .menu-row-item:last-child { border-bottom: none; }
        .menu-row-item:active { background: rgba(255,255,255,0.02); }

        .menu-row-item .icon-wrapper {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: var(--red-brand);
            font-size: 0.95rem;
        }

        /* Cores temáticas para os ícones das redes sociais */
        .menu-row-item.social-tg .icon-wrapper { color: var(--tg-blue); background: rgba(0, 136, 204, 0.05); }

        .menu-row-item span { font-size: 0.9rem; font-weight: 600; }
        .menu-row-item .chevron-right { margin-left: auto; color: #3f3f46; font-size: 0.8rem; }

        /* FLOATING TELEGRAM BUTTON RESIZED */
        .btn-float-tg {
            position: fixed; bottom: 95px; right: 20px;
            width: 50px; height: 50px; background-color: var(--tg-blue);
            color: #FFF; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 1.3rem; box-shadow: 0px 8px 20px rgba(0,0,0,0.5);
            z-index: 999; text-decoration: none;
        }

        /* NATIVE BOTTOM NAVIGATION HUB */
        .nav-bottom { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #000000; display: flex; justify-content: space-around; 
            padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.03); 
            z-index: 10000; height: 75px; align-items: center;
        }
        .nav-item { 
            color: #4c4c54; text-align: center; text-decoration: none; flex: 1; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            gap: 4px; transition: color 0.2s;
        }
        .nav-item i { font-size: 1.25rem; }
        .nav-item span { font-size: 0.65rem; font-weight: 500; }

        .nav-item.active { color: white; }
        .nav-item.active i { color: var(--red-brand); }

        .btn-logout-danger { 
            width: 100%; padding: 16px; border-radius: 18px; 
            border: 1px solid rgba(231, 76, 60, 0.15); background: transparent; 
            color: var(--red-brand); font-weight: 700; cursor: pointer;
            font-size: 0.9rem; transition: background 0.2s; margin-top: 10px;
        }
        .btn-logout-danger:active { background: rgba(231, 76, 60, 0.05); }
    </style>
</head>
<body>

    <a href="https://t.me/monety9220" target="_blank" class="btn-float-tg">
        <i class="fab fa-telegram-plane"></i>
    </a>

    <h1 class="page-title">Configurações</h1>

    <div class="investor-card">
        <div class="card-header-user">
            <div class="profile-avatar"><i class="fas fa-user-shield"></i></div>
            <div class="user-meta">
                <h2 id="display-nome">...</h2>
                <p id="display-email">carregando...</p>
            </div>
        </div>
        <div class="card-balances-grid">
            <div class="balance-block">
                <small>Saldo Disponível</small>
                <span id="stat-saldo">R$ 0,00</span>
            </div>
            <div class="balance-block" style="text-align: right;">
                <small>Rede Ativa</small>
                <span id="stat-indicados" style="color: #fff; font-size: 1.2rem;"><i class="fas fa-users" style="font-size:0.85rem; margin-right:4px; color: var(--red-brand);"></i>0</span>
            </div>
        </div>
    </div>

    <div class="menu-category-title">Operações Financeiras</div>
    <div class="menu-group-box">
        <a href="deposito.html" class="menu-item menu-row-item">
            <div class="icon-wrapper"><i class="fas fa-plus-circle"></i></div>
            <span>Adicionar Fundos</span>
            <i class="fas fa-chevron-right class chevron-right"></i>
        </a>
        <a href="saque.html" class="menu-item menu-row-item">
            <div class="icon-wrapper"><i class="fas fa-arrow-alt-circle-down"></i></div>
            <span>Solicitar Saque</span>
            <i class="fas fa-chevron-right class chevron-right"></i>
        </a>
        <a href="transacoes.html" class="menu-item menu-row-item">
            <div class="icon-wrapper"><i class="fas fa-exchange-alt"></i></div>
            <span>Extrato de Movimentações</span>
            <i class="fas fa-chevron-right class chevron-right"></i>
        </a>
    </div>

    <div class="menu-category-title">Suporte & Comunidade</div>
    <div class="menu-group-box">
        <a href="https://t.me/monety9220" target="_blank" class="menu-item menu-row-item social-tg">
            <div class="icon-wrapper"><i class="fas fa-headset"></i></div>
            <span>Atendimento ao Cliente</span>
            <i class="fas fa-external-link-alt class chevron-right"></i>
        </a>
        <a href="https://t.me/+qasEE92ROa5iOTYx" target="_blank" class="menu-item menu-row-item social-tg">
            <div class="icon-wrapper"><i class="fas fa-bullhorn"></i></div>
            <span>Canal do Telegram VIP</span>
            <i class="fas fa-external-link-alt class chevron-right"></i>
        </a>
    </div>

    <button class="btn-logout-danger" id="btnLogout">Desconectar da Conta</button>

    <nav class="nav-bottom">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>Início</span></a>
        <a href="planos.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Planos</span></a>
        <a href="indicacao.html" class="nav-item"><i class="fas fa-share-alt"></i><span>Indicar</span></a>
        <a href="perfil.html" class="nav-item active"><i class="fas fa-user-alt"></i><span>Perfil</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKDFw7khZzM9hIX7xbbrbFQeESiCLnmOw",
            authDomain: "monety-site-9175f.firebaseapp.com",
            projectId: "monety-site-9175f",
            storageBucket: "monety-site-9175f.firebasestorage.app",
            messagingSenderId: "840821848803",
            appId: "1:840821848803:web:b99a5528e4bb925518a3d6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('display-email').innerText = user.email;
                try {
                    const userRef = doc(db, "usuarios", user.uid);
                    const snap = await getDoc(userRef);
                    if(snap.exists()){
                        const d = snap.data();
                        document.getElementById('display-nome').innerText = d.nome || "Usuário";
                        document.getElementById('stat-saldo').innerText = `R$ ${(Number(d.saldo) || 0).toFixed(2)}`;
                        document.getElementById('stat-indicados').innerText = d.indicadosCount || 0;
                    }
                } catch (err) {
                    console.error("Erro ao carregar perfil:", err);
                }
            } else { 
                window.location.href = "index.html"; 
            }
        });

        document.getElementById('btnLogout').addEventListener('click', async () => {
            const result = await Swal.fire({
                title: 'Sair da conta?',
                text: "Você precisará fazer login novamente para acessar seus lucros.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e74c3c',
                cancelButtonColor: '#141419',
                confirmButtonText: 'Sim, sair',
                cancelButtonText: 'Cancelar',
                background: '#0a0a0c',
                color: '#fff'
            });

            if (result.isConfirmed) {
                signOut(auth).then(() => {
                    window.location.href = "index.html"; 
                });
            }
        });
    </script>
</body>
</html>
