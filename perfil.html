<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Nexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #060b19 0%, #020408 100%);
            --card-glass: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.07);
            --blue-primary: #0052ff;
            --blue-glow: rgba(0, 82, 255, 0.25);
            --cyan-neon: #00d2ff;
            --text-muted: #8a99ad;
            --tg-blue: #0088cc;
            --red-danger: #ff4b5c;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg-gradient); 
            color: white; 
            padding: 25px 20px; 
            padding-bottom: 120px; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* TÍTULO DA PÁGINA PREMIUM */
        .page-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 15px 5px 25px 5px;
            letter-spacing: -0.5px;
        }
        .page-title b { color: var(--cyan-neon); text-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }

        /* BLACK CARD DE INVESTIDOR GLASSMORPHISM */
        .investor-card {
            background: var(--card-glass);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .investor-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(0, 210, 255, 0.12);
            filter: blur(50px);
            border-radius: 50%;
        }

        .card-header-user {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 54px;
            height: 54px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--cyan-neon);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .user-meta h2 { font-size: 1.15rem; font-weight: 700; text-transform: capitalize; color: #fff; }
        .user-meta p { color: var(--text-muted); font-size: 0.8rem; margin-top: 2px; }

        /* Dados de Balanço FinTech */
        .card-balances-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 10px;
        }

        .balance-block small {
            font-size: 0.68rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .balance-block span {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
        }

        /* CATEGORIAS EM CÁPSULAS MODULARES */
        .menu-category-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin: 0 0 12px 8px;
        }

        .menu-group-box {
            background: var(--card-glass);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .menu-row-item {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            color: #efeff1;
            text-decoration: none;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .menu-row-item:last-child { border-bottom: none; }
        .menu-row-item:active { background: rgba(255,255,255,0.04); }

        .menu-row-item .icon-wrapper {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: var(--cyan-neon);
            font-size: 0.95rem;
        }

        /* Cores temáticas para redes sociais */
        .menu-row-item.social-tg .icon-wrapper { 
            color: var(--tg-blue); 
            background: rgba(0, 136, 204, 0.05); 
            border-color: rgba(0, 136, 204, 0.15);
        }

        .menu-row-item span { font-size: 0.9rem; font-weight: 600; }
        .menu-row-item .chevron-right { margin-left: auto; color: #4b5563; font-size: 0.8rem; }

        /* FLOATING TELEGRAM BUTTON RESIZED */
        .btn-float-tg {
            position: fixed; bottom: 95px; right: 20px;
            width: 50px; height: 50px; background-color: var(--tg-blue);
            color: #FFF; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 1.3rem; box-shadow: 0px 8px 25px rgba(0, 136, 204, 0.3);
            z-index: 999; text-decoration: none;
            transition: 0.2s;
        }
        .btn-float-tg:active { transform: scale(0.9); }

        /* NATIVE BOTTOM NAVIGATION HUB */
        .nav-bottom { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #030611; display: flex; justify-content: space-around; 
            padding: 10px 0; border-top: 1px solid var(--card-border); 
            z-index: 10000; height: 75px; align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .nav-item { 
            color: var(--text-muted); text-align: center; text-decoration: none; flex: 1; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            gap: 4px; transition: color 0.2s;
        }
        .nav-item i { font-size: 1.25rem; }
        .nav-item span { font-size: 0.65rem; font-weight: 500; }

        .nav-item.active { color: white; }
        .nav-item.active i { color: var(--cyan-neon); text-shadow: 0 0 10px rgba(0, 210, 255, 0.4); }

        /* BOTÃO LOGOUT DANGER ELEGANTE */
        .btn-logout-danger { 
            width: 100%; padding: 16px; border-radius: 18px; 
            border: 1px solid rgba(255, 75, 92, 0.15); background: rgba(255, 75, 92, 0.02); 
            color: var(--red-danger); font-weight: 700; cursor: pointer;
            font-size: 0.9rem; transition: 0.2s; margin-top: 10px;
        }
        .btn-logout-danger:active { background: rgba(255, 75, 92, 0.08); transform: scale(0.98); }
    </style>
</head>
<body>

    <a href="https://t.me/monety9220" target="_blank" class="btn-float-tg">
        <i class="fab fa-telegram-plane"></i>
    </a>

    <h1 class="page-title">Configurações<b>.</b></h1>

    <div class="investor-card animate__animated animate__fadeInDown">
        <div class="card-header-user">
            <div class="profile-avatar"><i class="fas fa-user-shield"></i></div>
            <div class="user-meta">
                <h2 id="display-nome">...</h2>
                <p id="display-email">carregando...</p>
            </div>
        </div>
        <div class="card-balances-grid">
            <div class="balance-block">
                <small>Saldo Disponível</small>
                <span id="stat-saldo">R$ 0,00</span>
            </div>
            <div class="balance-block" style="text-align: right;">
                <small>Rede Ativa</small>
                <span id="stat-indicados" style="color: #fff;"><i class="fas fa-users" style="font-size:0.85rem; margin-right:6px; color: var(--cyan-neon);"></i>0</span>
            </div>
        </div>
    </div>

    <div class="menu-category-title">Operações Financeiras</div>
    <div class="menu-group-box animate__animated animate__fadeInUp" style="animation-delay: 0.05s;">
        <a href="deposito.html" class="menu-item menu-row-item">
            <div class="icon-wrapper"><i class="fas fa-plus-circle"></i></div>
            <span>Adicionar Fundos</span>
            <i class="fas fa-chevron-right class chevron-right"></i>
        </a>
        <a href="saque.html" class="menu-item menu-row-item">
            <div class="icon-wrapper"><i class="fas fa-arrow-alt-circle-down"></i></div>
            <span>Solicitar Saque</span>
            <i class="fas fa-chevron-right class chevron-right"></i>
        </a>
        <a href="transacoes.html" class="menu-item menu-row-item">
            <div class="icon-wrapper"><i class="fas fa-exchange-alt"></i></div>
            <span>Extrato de Movimentações</span>
            <i class="fas fa-chevron-right class chevron-right"></i>
        </a>
    </div>

    <div class="menu-category-title">Suporte & Comunidade</div>
    <div class="menu-group-box animate__animated animate__fadeInUp" style="animation-delay: 0.1s;">
        <a href="https://t.me/monety9220" target="_blank" class="menu-item menu-row-item social-tg">
            <div class="icon-wrapper"><i class="fas fa-headset"></i></div>
            <span>Atendimento ao Cliente</span>
            <i class="fas fa-external-link-alt class chevron-right"></i>
        </a>
        <a href="https://t.me/+qasEE92ROa5iOTYx" target="_blank" class="menu-item menu-row-item social-tg">
            <div class="icon-wrapper"><i class="fas fa-bullhorn"></i></div>
            <span>Canal do Telegram VIP</span>
            <i class="fas fa-external-link-alt class chevron-right"></i>
        </a>
    </div>

    <button class="btn-logout-danger animate__animated animate__fadeInUp" style="animation-delay: 0.15s;" id="btnLogout">Desconectar da Conta</button>

    <nav class="nav-bottom">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>Início</span></a>
        <a href="planos.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Planos</span></a>
        <a href="indicacao.html" class="nav-item"><i class="fas fa-share-alt"></i><span>Indicar</span></a>
        <a href="perfil.html" class="nav-item active"><i class="fas fa-user-alt"></i><span>Perfil</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKDFw7khZzM9hIX7xbbrbFQeESiCLnmOw",
            authDomain: "monety-site-9175f.firebaseapp.com",
            projectId: "monety-site-9175f",
            storageBucket: "monety-site-9175f.firebasestorage.app",
            messagingSenderId: "840821848803",
            appId: "1:840821848803:web:b99a5528e4bb925518a3d6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('display-email').innerText = user.email;
                try {
                    const userRef = doc(db, "usuarios", user.uid);
                    const snap = await getDoc(userRef);
                    if(snap.exists()){
                        const d = snap.data();
                        document.getElementById('display-nome').innerText = d.nome || "Usuário";
                        document.getElementById('stat-saldo').innerText = `R$ ${(Number(d.saldo) || 0).toFixed(2)}`;
                        document.getElementById('stat-indicados').innerText = d.indicadosCount || 0;
                    }
                } catch (err) {
                    console.error("Erro ao carregar perfil:", err);
                }
            } else { 
                window.location.href = "index.html"; 
            }
        });

        document.getElementById('btnLogout').addEventListener('click', async () => {
            const result = await Swal.fire({
                title: 'Sair da conta?',
                text: "Você precisará fazer login novamente para acessar seus lucros.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff4b5c',
                cancelButtonColor: 'rgba(255,255,255,0.05)',
                confirmButtonText: 'Sim, sair',
                cancelButtonText: 'Cancelar',
                background: '#060b19',
                color: '#fff'
            });

            if (result.isConfirmed) {
                signOut(auth).then(() => {
                    window.location.href = "index.html"; 
                });
            }
        });
    </script>
</body>
</html>
