<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito - Nexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-darkness: #09090b;
            --card-glass-dark: #121217;
            --neon-green: #2ecc71;
            --neon-green-glow: rgba(46, 204, 113, 0.2);
            --gold: #f59e0b;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg-darkness); 
            color: white; 
            padding: 20px; 
            min-height: 100vh; 
        }

        .custom-nav-header { 
            display: flex; 
            align-items: center; 
            margin-bottom: 25px; 
            gap: 15px; 
        }
        .custom-nav-header a { color: #a1a1aa; text-decoration: none; font-size: 1.1rem; }
        .custom-nav-header span { font-weight: 700; font-size: 1.1rem; color: #fff; }

        .secure-alert-banner { 
            background: rgba(245, 158, 11, 0.05); 
            padding: 16px; 
            border-radius: 16px; 
            border: 1px solid rgba(245, 158, 11, 0.15); 
            margin-bottom: 30px; 
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .secure-alert-banner i { color: var(--gold); font-size: 1.2rem; }
        .secure-alert-banner p { font-size: 0.78rem; color: #d97706; line-height: 1.4; }

        /* ROW HORIZONTAL DE CÁPSULAS PARA VALORES RÁPIDOS */
        .scroll-amount-row { 
            display: flex; 
            gap: 8px; 
            overflow-x: auto; 
            padding-bottom: 15px;
            margin-bottom: 25px;
            scrollbar-width: none;
        }
        .scroll-amount-row::-webkit-scrollbar { display: none; }
        
        .chip-amount-select { 
            background: var(--card-glass-dark); 
            border: 1px solid rgba(255,255,255,0.03); 
            padding: 12px 22px; 
            white-space: nowrap;
            border-radius: 30px; 
            cursor: pointer; 
            font-size: 0.85rem;
            font-weight: 600;
            color: #a1a1aa;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chip-amount-select.active { 
            border-color: var(--neon-green); 
            color: #fff; 
            background: rgba(46, 204, 113, 0.12); 
            box-shadow: 0 4px 15px var(--neon-green-glow);
        }

        /* DISPLAY DIGITAL GIGANTE CENTRALIZADO */
        .digital-teller-display { 
            margin-bottom: 35px; 
            text-align: center;
        }
        .digital-teller-display label { 
            display: block; 
            margin-bottom: 12px; 
            font-size: 0.75rem; 
            color: #71717a; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .teller-input-box { 
            position: relative; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .teller-input-box .currency-label { 
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--neon-green); 
            margin-right: 8px;
        }

        .digital-teller-display input { 
            width: 70%; 
            padding: 10px 0;
            background: transparent; 
            border: none; 
            border-bottom: 2px solid rgba(255,255,255,0.05);
            border-radius: 0px;
            color: white; 
            font-size: 2.6rem;
            font-weight: 900;
            text-align: left;
            transition: border-color 0.3s;
        }
        .digital-teller-display input:focus {
            border-color: var(--neon-green);
            box-shadow: none;
        }

        /* DIGITAL PREMIUM VOUCHER RECEIPT */
        #qr-container {
            display: none;
            background: #111115;
            color: white;
            padding: 30px 20px;
            border-radius: 28px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.04);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            animation: expandVoucher 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes expandVoucher {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        #qr-container h2 { font-size: 1.2rem; font-weight: 700; color: #fff; }
        
        /* Box do QR Code com efeito de laser simulado */
        .qr-image-wrapper {
            position: relative;
            display: inline-block;
            margin: 25px 0;
            background: #fff;
            padding: 12px;
            border-radius: 20px;
            overflow: hidden;
        }
        .qr-image-wrapper img {
            width: 200px; height: 200px;
            display: block;
        }
        /* Linha laser de scan cibernético */
        .qr-image-wrapper::after {
            content: '';
            position: absolute;
            left: 0; top: 0; width: 100%; height: 3px;
            background: rgba(46, 204, 113, 0.8);
            box-shadow: 0 0 12px var(--neon-green);
            animation: laserScan 2s linear infinite;
        }
        @keyframes laserScan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        
        .hash-code-container {
            background: rgba(0,0,0,0.3); 
            padding: 15px; 
            border-radius: 14px;
            font-size: 0.72rem; 
            word-break: break-all; 
            border: 1px solid rgba(255,255,255,0.02);
            margin-bottom: 25px; 
            color: #a1a1aa; 
            line-height: 1.5;
            text-align: center;
        }

        .btn-core-action { 
            width: 100%; 
            padding: 18px; 
            border-radius: 16px; 
            border: none; 
            background: linear-gradient(90deg, #2ecc71 0%, #27ae60 100%); 
            color: white; 
            font-weight: 700; 
            font-size: 0.95rem; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 12px;
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.25);
            transition: all 0.2s;
        }
        .btn-core-action:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-dismiss {
            background: rgba(255,255,255,0.03) !important;
            border: 1px solid rgba(255,255,255,0.05) !important;
            color: #e4e4e7 !important;
            box-shadow: none !important;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="deposito-screen">
        <div class="custom-nav-header">
            <a href="home.html"><i class="fas fa-arrow-left"></i></a>
            <span>Adicionar Saldo</span>
        </div>

        <div class="secure-alert-banner">
            <i class="fas fa-shield-halved"></i>
            <p>O aporte mínimo operacional é de <b>R$ 1,00</b>. As transações PIX passam por checkout assíncrono e creditam em segundos.</p>
        </div>

        <div class="scroll-amount-row">
            <div class="chip-amount-select" onclick="setAmount(1, this)">R$ 1</div>
            <div class="chip-amount-select" onclick="setAmount(75, this)">R$ 75</div>
            <div class="chip-amount-select" onclick="setAmount(100, this)">R$ 100</div>
            <div class="chip-amount-select" onclick="setAmount(150, this)">R$ 150</div>
            <div class="chip-amount-select" onclick="setAmount(500, this)">R$ 500</div>
            <div class="chip-amount-select" onclick="setAmount(1000, this)">R$ 1000</div>
        </div>

        <div class="digital-teller-display">
            <label>Defina o montante de transferência</label>
            <div class="teller-input-box">
                <span class="currency-label">R$</span>
                <input type="number" id="deposito-valor" placeholder="50.00">
            </div>
        </div>

        <button class="btn-core-action" id="btn-gerar" onclick="processarDeposito()">
            <i class="fas fa-bolt"></i> EMITIR CHAVE PIX
        </button>
    </div>

    <div id="qr-container">
        <h2>Ordem de Pagamento Gerada</h2>
        <p style="font-size: 0.8rem; color: #71717a; margin-top: 4px;">Escaneie o QR Code dinâmico abaixo</p>
        
        <div class="qr-image-wrapper">
            <img id="qr-img" src="" alt="QR Code">
        </div>
        
        <div class="hash-code-container" id="pix-copy-text">Sincronizando hash de pagamento...</div>
        
        <button class="btn-core-action" onclick="copiarPix()">
            <i class="fas fa-copy"></i> COPIAR CHAVE COPIA E COLA
        </button>
        <button class="btn-core-action btn-dismiss" onclick="location.reload()">
            <i class="fas fa-rotate-left"></i> CANCELAR SOLICITAÇÃO
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKDFw7khZzM9hIX7xbbrbFQeESiCLnmOw",
            authDomain: "monety-site-9175f.firebaseapp.com",
            projectId: "monety-site-9175f",
            storageBucket: "monety-site-9175f.firebasestorage.app",
            messagingSenderId: "840821848803",
            appId: "1:840821848803:web:b99a5528e4bb925518a3d6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let pixGlobal = "";
        let uidUsuario = null;
        let emailUsuario = null;
        let nomeUsuario = "Cliente ByteWay"; 
        let unsubscribeHistorico = null;
        
        const urlPipedream = 'https://eom5l7ta9zssef4.m.pipedream.net';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                uidUsuario = user.uid;
                emailUsuario = user.email;
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                if(userDoc.exists()) {
                    nomeUsuario = userDoc.data().nome || "Cliente ByteWay";
                }
            } else {
                window.location.href = "login.html";
            }
        });

        window.setAmount = function(valor, element) {
            document.getElementById('deposito-valor').value = valor;
            document.querySelectorAll('.chip-amount-select').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
        }

        function monitorarHistoricoDepot() {
            const historicoRef = collection(db, "historico");
            const q = query(
                historicoRef,
                where("userId", "==", uidUsuario),
                where("tipo", "==", "Depósito"),
                orderBy("data", "desc"),
                limit(1)
            );

            const horaGeracaoPix = new Date();

            unsubscribeHistorico = onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const dados = change.doc.data();
                        const dataFirestore = dados.data.toDate ? dados.data.toDate() : new Date(dados.data);

                        if (dataFirestore >= horaGeracaoPix) {
                            if (unsubscribeHistorico) unsubscribeHistorico();
                            exibirSucessoFina(dados.valor);
                        }
                    }
                });
            });
        }

        async function exibirSucessoFina(valor) {
            const userDoc = await getDoc(doc(db, "usuarios", uidUsuario));
            const saldoFinal = userDoc.exists() ? userDoc.data().saldo : 0;

            Swal.fire({
                title: 'DEPÓSITO CONFIRMADO!',
                html: `
                    <div style="padding: 10px; color: #fff; text-align: center;">
                        <i class="fas fa-check-circle" style="font-size: 3rem; color: #2ecc71; margin-bottom: 15px;"></i>
                        <p style="font-size: 1.1rem; margin-bottom: 10px;">Recebemos seu PIX de <b>R$ ${valor.toFixed(2)}</b></p>
                        <p style="font-size: 0.9rem; color: #71717a;">Seu saldo operacional foi atualizado para:</p>
                        <h2 style="color: #2ecc71; margin-top: 8px;">R$ ${saldoFinal.toFixed(2)}</h2>
                    </div>
                `,
                background: '#09090b',
                confirmButtonColor: '#2ecc71',
                confirmButtonText: 'ACESSAR CONTA',
                allowOutsideClick: false,
                backdrop: `rgba(0,0,0,0.85)`
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = "home.html";
                }
            });
        }

        window.processarDeposito = async function() {
            const valorInput = document.getElementById('deposito-valor');
            const valor = parseFloat(valorInput.value);
            const btn = document.getElementById('btn-gerar');

            if (isNaN(valor) || valor < 1) {
                return Swal.fire({ icon: 'error', title: 'Valor Inválido', text: 'Mínimo R$ 50,00', background: '#09090b', color: '#fff', confirmButtonColor: '#ff3838' });
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> CRIPTOGRAFANDO CHAVE...';

            try {
                const response = await fetch(urlPipedream, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        amount: valor,
                        userId: uidUsuario,
                        userName: nomeUsuario,
                        type: 'deposito_pix'
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('deposito-screen').style.display = 'none';
                    document.getElementById('qr-container').style.display = 'block';

                    pixGlobal = data.pix_code; 
                    document.getElementById('pix-copy-text').innerText = pixGlobal;
                    document.getElementById('qr-img').src = data.qr_image; 

                    monitorarHistoricoDepot();
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Erro', text: 'Falha ao gerar PIX.', background: '#09090b', color: '#fff', confirmButtonColor: '#ff3838' });
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-bolt"></i> EMITIR CHAVE PIX';
            }
        }

        window.copiarPix = function() {
            if(!pixGlobal) return;
            navigator.clipboard.writeText(pixGlobal).then(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'Código Copiado!',
                    text: 'Efetue a transferência no app do seu banco.',
                    showConfirmButton: false,
                    timer: 1500,
                    background: '#09090b',
                    color: '#fff'
                });
            });
        }
    </script>
</body>
</html>
