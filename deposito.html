<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito - Nexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-darkness: #09090b;
            --card-bg: #141419;
            --border-color: rgba(255, 255, 255, 0.06);
            --neon-green: #2ecc71;
            --neon-green-glow: rgba(46, 204, 113, 0.15);
            --gold: #f59e0b;
            --text-secondary: #a1a1aa;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg-darkness); 
            color: white; 
            min-height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-top: 10px;
        }

        .custom-nav-header { 
            display: flex; 
            align-items: center; 
            margin-bottom: 24px; 
            gap: 16px; 
        }
        .custom-nav-header a { 
            color: var(--text-secondary); 
            text-decoration: none; 
            font-size: 1.2rem; 
            transition: color 0.2s;
        }
        .custom-nav-header a:hover { color: #fff; }
        .custom-nav-header span { font-weight: 700; font-size: 1.15rem; color: #fff; }

        .secure-alert-banner { 
            background: rgba(245, 158, 11, 0.06); 
            padding: 14px 16px; 
            border-radius: 14px; 
            border: 1px solid rgba(245, 158, 11, 0.15); 
            margin-bottom: 24px; 
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .secure-alert-banner i { color: var(--gold); font-size: 1.2rem; }
        .secure-alert-banner p { font-size: 0.8rem; color: #fbbf24; line-height: 1.4; }

        .scroll-amount-row { 
            display: flex; 
            gap: 8px; 
            overflow-x: auto; 
            padding-bottom: 8px;
            margin-bottom: 24px;
            scrollbar-width: none;
        }
        .scroll-amount-row::-webkit-scrollbar { display: none; }
        
        .chip-amount-select { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border-color); 
            padding: 10px 20px; 
            white-space: nowrap;
            border-radius: 100px; 
            cursor: pointer; 
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        .chip-amount-select:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .chip-amount-select.active { 
            border-color: var(--neon-green); 
            color: #fff; 
            background: rgba(46, 204, 113, 0.1); 
            box-shadow: 0 4px 12px var(--neon-green-glow);
        }

        .digital-teller-display { 
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px; 
            text-align: center;
        }
        .digital-teller-display label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.75rem; 
            color: var(--text-secondary); 
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }
        
        .teller-input-box { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .teller-input-box .currency-label { 
            font-size: 2rem;
            font-weight: 800;
            color: var(--neon-green); 
            margin-right: 6px;
        }

        .digital-teller-display input { 
            width: 60%; 
            background: transparent; 
            border: none; 
            color: white; 
            font-size: 2.4rem;
            font-weight: 800;
            text-align: left;
        }

        #qr-container {
            display: none;
            text-align: center;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #qr-container h2 { font-size: 1.25rem; font-weight: 700; color: #fff; }
        
        .qr-image-wrapper {
            position: relative;
            display: inline-block;
            margin: 20px 0;
            background: #fff;
            padding: 12px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .qr-image-wrapper img {
            width: 180px; 
            height: 180px;
            display: block;
        }
        .qr-image-wrapper::after {
            content: '';
            position: absolute;
            left: 0; top: 0; width: 100%; height: 2px;
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
            animation: laserScan 2.5s linear infinite;
        }
        @keyframes laserScan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        
        .hash-code-container {
            background: rgba(0, 0, 0, 0.4); 
            padding: 14px; 
            border-radius: 12px;
            font-size: 0.75rem; 
            word-break: break-all; 
            border: 1px solid var(--border-color);
            margin-bottom: 20px; 
            color: var(--text-secondary); 
            line-height: 1.5;
            max-height: 75px;
            overflow-y: auto;
        }

        .btn-core-action { 
            width: 100%; 
            padding: 16px; 
            border-radius: 14px; 
            border: none; 
            background: linear-gradient(90deg, #2ecc71 0%, #27ae60 100%); 
            color: white; 
            font-weight: 700; 
            font-size: 0.95rem; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 12px;
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.2);
            transition: all 0.2s ease;
        }
        .btn-core-action:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(46, 204, 113, 0.3);
        }
        .btn-core-action:active:not(:disabled) { transform: translateY(1px); }
        .btn-core-action:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-dismiss {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid var(--border-color) !important;
            color: #e4e4e7 !important;
            box-shadow: none !important;
            margin-top: 4px;
        }
        .btn-dismiss:hover { background: rgba(255, 255, 255, 0.06) !important; color: #fff !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="deposito-screen">
            <div class="custom-nav-header">
                <a href="home.html"><i class="fas fa-arrow-left"></i></a>
                <span>Adicionar Saldo</span>
            </div>

            <div class="secure-alert-banner">
                <i class="fas fa-shield-halved"></i>
                <p>O aporte mínimo operacional é de <b>R$ 35,00</b>. Transações PIX passam por checkout automático e creditam em segundos.</p>
            </div>

            <div class="scroll-amount-row">
                <div class="chip-amount-select active" onclick="setAmount(35, this)">R$ 35</div>
                <div class="chip-amount-select" onclick="setAmount(50, this)">R$ 50</div>
                <div class="chip-amount-select" onclick="setAmount(100, this)">R$ 100</div>
                <div class="chip-amount-select" onclick="setAmount(150, this)">R$ 150</div>
                <div class="chip-amount-select" onclick="setAmount(500, this)">R$ 500</div>
                <div class="chip-amount-select" onclick="setAmount(1000, this)">R$ 1000</div>
            </div>

            <div class="digital-teller-display">
                <label>Defina o montante de transferência</label>
                <div class="teller-input-box">
                    <span class="currency-label">R$</span>
                    <input type="number" id="deposito-valor" value="35" placeholder="35.00">
                </div>
            </div>

            <button class="btn-core-action" id="btn-gerar" onclick="processarDeposito()">
                <i class="fas fa-bolt"></i> EMITIR CHAVE PIX
            </button>
        </div>

        <div id="qr-container">
            <h2>Ordem de Pagamento Gerada</h2>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px;">Escaneie o QR Code abaixo</p>
            
            <div class="qr-image-wrapper">
                <img id="qr-img" src="" alt="QR Code">
            </div>
            
            <div class="hash-code-container" id="pix-copy-text">Sincronizando hash de pagamento...</div>
            
            <button class="btn-core-action" onclick="copiarPix()">
                <i class="fas fa-copy"></i> COPIAR CÓDIGO PIX
            </button>
            <button class="btn-core-action btn-dismiss" onclick="location.reload()">
                <i class="fas fa-rotate-left"></i> CANCELAR SOLICITAÇÃO
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKDFw7khZzM9hIX7xbbrbFQeESiCLnmOw",
            authDomain: "monety-site-9175f.firebaseapp.com",
            projectId: "monety-site-9175f",
            storageBucket: "monety-site-9175f.firebasestorage.app",
            messagingSenderId: "840821848803",
            appId: "1:840821848803:web:b99a5528e4bb925518a3d6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let pixGlobal = "";
        let uidUsuario = null;
        let emailUsuario = null;
        let nomeUsuario = "Cliente ByteWay"; 
        let unsubscribeHistorico = null;
        
        const urlPipedream = 'https://eom5l7ta9zssef4.m.pipedream.net';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                uidUsuario = user.uid;
                emailUsuario = user.email;
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                if(userDoc.exists()) {
                    nomeUsuario = userDoc.data().nome || "Cliente ByteWay";
                }
            } else {
                window.location.href = "login.html";
            }
        });

        window.setAmount = function(valor, element) {
            document.getElementById('deposito-valor').value = valor;
            document.querySelectorAll('.chip-amount-select').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
        }

        function monitorarHistoricoDepot() {
            const historicoRef = collection(db, "historico");
            const q = query(
                historicoRef,
                where("userId", "==", uidUsuario),
                where("tipo", "==", "Depósito"),
                orderBy("data", "desc"),
                limit(1)
            );

            const horaGeracaoPix = new Date();

            unsubscribeHistorico = onSnapshot(q, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const dados = change.doc.data();
                        const dataFirestore = dados.data.toDate ? dados.data.toDate() : new Date(dados.data);

                        if (dataFirestore >= horaGeracaoPix) {
                            if (unsubscribeHistorico) unsubscribeHistorico();
                            exibirSucessoFina(dados.valor);
                        }
                    }
                });
            });
        }

        async function exibirSucessoFina(valor) {
            const userDoc = await getDoc(doc(db, "usuarios", uidUsuario));
            const saldoFinal = userDoc.exists() ? userDoc.data().saldo : 0;

            Swal.fire({
                title: 'DEPÓSITO CONFIRMADO!',
                html: `
                    <div style="padding: 10px; color: #fff; text-align: center;">
                        <i class="fas fa-check-circle" style="font-size: 3rem; color: #2ecc71; margin-bottom: 15px;"></i>
                        <p style="font-size: 1.1rem; margin-bottom: 10px;">Recebemos seu PIX de <b>R$ ${valor.toFixed(2)}</b></p>
                        <p style="font-size: 0.9rem; color: #71717a;">Seu saldo operacional foi atualizado para:</p>
                        <h2 style="color: #2ecc71; margin-top: 8px;">R$ ${saldoFinal.toFixed(2)}</h2>
                    </div>
                `,
                background: '#141419',
                confirmButtonColor: '#2ecc71',
                confirmButtonText: 'ACESSAR CONTA',
                allowOutsideClick: false,
                backdrop: `rgba(0,0,0,0.85)`
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = "home.html";
                }
            });
        }

        window.processarDeposito = async function() {
            const valorInput = document.getElementById('deposito-valor');
            const valor = parseFloat(valorInput.value);
            const btn = document.getElementById('btn-gerar');

            if (isNaN(valor) || valor < 35) {
                return Swal.fire({ icon: 'error', title: 'Valor Mínimo', text: 'O valor mínimo para depósito é de R$ 35,00', background: '#141419', color: '#fff', confirmButtonColor: '#ff3838' });
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> GERANDO CHAVE...';

            try {
                const response = await fetch(urlPipedream, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        amount: valor,
                        userId: uidUsuario,
                        userName: nomeUsuario,
                        type: 'deposito_pix'
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('deposito-screen').style.display = 'none';
                    document.getElementById('qr-container').style.display = 'block';

                    pixGlobal = data.pix_code; 
                    document.getElementById('pix-copy-text').innerText = pixGlobal;
                    document.getElementById('qr-img').src = data.qr_image; 

                    monitorarHistoricoDepot();
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Erro', text: 'Falha ao gerar PIX.', background: '#141419', color: '#fff', confirmButtonColor: '#ff3838' });
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-bolt"></i> EMITIR CHAVE PIX';
            }
        }

        window.copiarPix = function() {
            if(!pixGlobal) return;
            navigator.clipboard.writeText(pixGlobal).then(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'Código Copiado!',
                    text: 'Efetue a transferência no app do seu banco.',
                    showConfirmButton: false,
                    timer: 1500,
                    background: '#141419',
                    color: '#fff'
                });
            });
        }
    </script>
</body>
</html>
